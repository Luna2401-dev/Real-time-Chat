<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact - ResumeAI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="contact.css">
</head>
<body>

<!-- Navbar -->
<header>
  <div class="logo">resume<span>.</span></div>
  <nav>
    <a href="home.html">Home</a>
    <a href="home.html#features">Features</a>
    <a href="home.html#testimonials">Testimonials</a>
    <a href="pricing.html">Pricing</a>
    <a href="contact.html">Contact</a>
  </nav>
  </header>

<!-- Contact Section -->
<section class="contact">

  <div class="contact-header">
    <h1>Get in Touch</h1>
    <p>Have questions or need help? We'd love to hear from you.</p>
  </div>

  <div class="contact-wrapper">

    <!-- Left: Form -->
    <div class="contact-form">
      <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea rows="5" placeholder="Your Message" required></textarea>
        <button class="btn-primary">Send Message</button>
      </form>
    </div>

    <!-- Right: Info -->
    <div class="contact-info">
      <h3>Contact Information</h3>
      <p>Email: support@resumeai.com</p>
      <p>Phone: +91 98765 43210</p>
      <p>Location: India</p>
    </div>

  </div>

</section>

<!-- Footer -->
<footer>
  <p>© 2026 ResumeAI. All rights reserved.</p>
</footer>

</body>
</html>

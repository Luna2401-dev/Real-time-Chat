<html>
<head>
  <title>Resume Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #c6e3f1;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      display: flex;
      gap: 30px;
    }

    .card {
      width: 200px;
      height: 150px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .icon {
      font-size: 40px;
      margin-bottom: 10px;
    }

    /* Popup Style */
    .popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    .popup-content {
      background: white;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      width: 300px;
    }

    .close-btn {
      margin-top: 15px;
      padding: 8px 15px;
      border: none;
      background: red;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

  </style>
</head>
<body>

  <div class="container">
    <div class="card" onclick="openPopup('create')">
      <div class="icon">➕</div>
      <h3>Create Resume</h3>
    </div>

    <div class="card" onclick="openPopup('upload')">
      <div class="icon">📂</div>
      <h3>Upload Existing</h3>
    </div>
  </div>

  <!-- Popup -->
  <div class="popup" id="popup">
    <div class="popup-content">
      <h2 id="popupText"></h2>
      <button class="close-btn" onclick="closePopup()">Close</button>
    </div>
  </div>

<script>
  function openPopup(type) {
   window.location.href = "page2.html";}

 
</script>

</body>
</html>
